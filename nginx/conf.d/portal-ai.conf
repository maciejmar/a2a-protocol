# ──────────────────────────────────────────────────────────────────────────────
# A2A Protocol — orchestrator-agent (8042) i rag-agent (8043)
# Wklej do /root/nginx/conf/default.conf na serwerze (wspólny nginx wszystkich apek)
# Przeładuj: docker exec portal-ai-nginx nginx -s reload
#
# SSE (GET /a2a/tasks/{task_id}/stream) wymaga wyłączonego buforowania — PRD sekcja 14.
# ──────────────────────────────────────────────────────────────────────────────

location = /agents/orchestrator-agent {
    return 301 /agents/orchestrator-agent/;
}

location /agents/orchestrator-agent/ {
    proxy_pass          http://10.112.32.19:8042/;
    proxy_http_version  1.1;
    proxy_set_header    Host                $host;
    proxy_set_header    X-Real-IP           $remote_addr;
    proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto   $scheme;
    proxy_set_header    X-Forwarded-Prefix  /agents/orchestrator-agent;
    proxy_set_header    X-Request-Id        $request_id;
    proxy_buffering     off;
    proxy_cache         off;
    proxy_read_timeout  3600s;
    chunked_transfer_encoding off;
}

location = /agents/rag-agent {
    return 301 /agents/rag-agent/;
}

location /agents/rag-agent/ {
    proxy_pass          http://10.112.32.19:8043/;
    proxy_http_version  1.1;
    proxy_set_header    Host                $host;
    proxy_set_header    X-Real-IP           $remote_addr;
    proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto   $scheme;
    proxy_set_header    X-Forwarded-Prefix  /agents/rag-agent;
    proxy_set_header    X-Request-Id        $request_id;
    proxy_buffering     off;
    proxy_cache         off;
    proxy_read_timeout  3600s;
    chunked_transfer_encoding off;
}

# Kolejny agent? Skopiuj jeden z dwóch bloków powyżej, zmień nazwę i port hosta
# (patrz docker-compose.yml -> ports), dopisz wpis w config/agents.yaml i przeładuj nginx.
