# Lokalny rejestr agentów A2A — PRD sekcja 8.
# Dodanie nowego agenta = dopisanie wpisu tutaj + dopisanie service'u w docker-compose.yml
# + dopisanie ścieżki w nginx + `docker compose up --build`.

agents:
  orchestrator-agent:
    enabled: true
    internal_url: "http://orchestrator-agent:8000"
    public_base_path: "/agents/orchestrator-agent"
    card_url: "http://orchestrator-agent:8000/.well-known/agent-card.json"

  rag-agent:
    enabled: true
    internal_url: "http://rag-agent:8000"
    public_base_path: "/agents/rag-agent"
    card_url: "http://rag-agent:8000/.well-known/agent-card.json"
